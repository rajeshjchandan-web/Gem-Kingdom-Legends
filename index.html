<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Gem Kingdom Legends</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Fredoka:wght@600;700&display=swap');

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{margin:0;height:100%;overflow:hidden;background:#061533;color:white;font-family:'Fredoka',system-ui,sans-serif}
body{display:flex;align-items:center;justify-content:center}

.game{
  width:min(100vw,520px);
  height:100dvh;
  max-height:980px;
  position:relative;
  overflow:hidden;
  background:
    radial-gradient(circle at 50% 8%,#7adfff 0 10%,#198af2 22%,#105db9 42%,#102f69 62%,#061331 100%);
}

/* Background similar to reference */
.bg{position:absolute;inset:0;overflow:hidden}
.bg:before{
  content:"";
  position:absolute;inset:0;
  background:
    linear-gradient(180deg,rgba(255,255,255,.25),transparent 22%,rgba(2,20,50,.18) 70%,rgba(0,0,0,.65)),
    radial-gradient(circle at 18% 17%,rgba(255,255,255,.38),transparent 18%),
    radial-gradient(circle at 82% 22%,rgba(255,225,80,.28),transparent 17%);
}
.castle{position:absolute;right:-38px;top:64px;font-size:178px;opacity:.32;filter:drop-shadow(0 10px 10px rgba(0,0,0,.35))}
.falls1,.falls2{position:absolute;border-radius:90px;background:linear-gradient(180deg,rgba(255,255,255,.58),rgba(64,225,255,.24),transparent);opacity:.52}
.falls1{left:-34px;top:210px;width:148px;height:520px;transform:rotate(13deg)}
.falls2{right:-72px;top:270px;width:120px;height:440px;transform:rotate(-8deg)}
.hills{position:absolute;left:-60px;right:-60px;bottom:130px;height:260px;background:
 radial-gradient(circle at 15% 70%,#1d8c4d 0 8%,transparent 26%),
 radial-gradient(circle at 80% 68%,#2aa24d 0 10%,transparent 27%),
 linear-gradient(180deg,transparent,#0d5e48 45%,#092840 100%);opacity:.65}

/* safe top controls */
.topCounters{position:absolute;left:10px;top:calc(14px + env(safe-area-inset-top));z-index:10;display:grid;gap:8px}
.counter{
  height:43px;min-width:128px;border-radius:28px;
  background:linear-gradient(180deg,#ff62ec,#7a22bc 62%,#4d117f);
  border:3px solid rgba(255,255,255,.58);
  box-shadow:0 6px 0 #351062,0 11px 17px rgba(0,0,0,.32);
  display:flex;align-items:center;gap:9px;padding:4px 9px;
  font-size:21px;font-weight:900;text-shadow:0 3px 0 #35084f;
}
.counter i{
  width:35px;height:35px;border-radius:50%;display:grid;place-items:center;font-style:normal;
  background:linear-gradient(180deg,#fff779,#ff9b16);
  box-shadow:inset 0 2px 0 rgba(255,255,255,.72),0 2px 0 rgba(0,0,0,.25)
}
.topButtons{position:absolute;right:11px;top:calc(14px + env(safe-area-inset-top));z-index:10;display:grid;gap:9px}
.roundBtn{
  width:50px;height:50px;border:4px solid rgba(255,255,255,.68);border-radius:50%;
  background:linear-gradient(180deg,#8dfcff,#1c72ff 65%,#1250c7);
  box-shadow:0 6px 0 #10428b,0 11px 18px rgba(0,0,0,.35);
  color:#fff;font-size:25px;
}

/* Big shiny logo */
.logoWrap{
  position:relative;z-index:5;
  margin:calc(58px + env(safe-area-inset-top)) auto 0;
  width:78%;text-align:center;
  filter:drop-shadow(0 10px 8px rgba(0,0,0,.38));
}
.crown{font-size:54px;line-height:20px}
.logo{
  margin:0;font-family:'Baloo 2',cursive;text-transform:uppercase;letter-spacing:1px;
  font-size:clamp(52px,15vw,82px);line-height:.76;
}
.logo .gem{
  display:block;
  background:linear-gradient(180deg,#fff984 0%,#ffc02c 45%,#ff7900 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  -webkit-text-stroke:3px #872899;
  text-shadow:0 6px 0 #55157e,0 10px 12px rgba(0,0,0,.22);
}
.logo .kingdom{
  display:block;
  background:linear-gradient(180deg,#9efcff 0%,#1cbcff 45%,#1260ff 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  -webkit-text-stroke:3px #12368c;
  text-shadow:0 6px 0 #0b2873,0 10px 12px rgba(0,0,0,.22);
}
.ribbon{
  display:inline-block;margin-top:0;padding:1px 30px 5px;border-radius:0 0 22px 22px;
  background:linear-gradient(180deg,#ff3e78,#bd124f);
  border:3px solid #ffcf44;
  font-family:'Baloo 2';font-size:27px;font-weight:900;
  text-shadow:0 3px 0 #660931;box-shadow:0 5px 0 #650832;
}

/* Goal panel */
.status{
  position:relative;z-index:6;margin:6px auto 0;width:94%;height:82px;border-radius:26px;
  background:linear-gradient(180deg,#fa70c6,#d91e87 58%,#8e0d64);
  border:4px solid rgba(255,198,232,.95);
  box-shadow:0 8px 0 #66124a,0 15px 24px rgba(0,0,0,.33);
  display:grid;grid-template-columns:98px 1fr 84px;overflow:hidden;
}
.levelShield{
  display:grid;place-items:center;background:linear-gradient(180deg,#ffe24d,#ff8c1b);
  border-right:3px solid rgba(255,255,255,.35)
}
.levelShield span{font-size:15px;font-weight:900;text-transform:uppercase}
.levelShield b{font-size:45px;line-height:.7;text-shadow:0 4px 0 #73104f}
.goalBoxes{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:10px}
.goalBox{
  border-radius:16px;text-align:center;padding:3px;
  background:linear-gradient(180deg,rgba(255,255,255,.22),rgba(67,7,82,.46));
  box-shadow:inset 0 2px 0 rgba(255,255,255,.25)
}
.goalBox span{display:block;color:#ffe55d;font-size:12px;text-transform:uppercase}
.goalBox b{font-size:30px;text-shadow:0 3px 0 #4c0b57}
.king{font-size:58px;display:grid;place-items:center;background:linear-gradient(180deg,#fff075,#ffb22b);border-left:3px solid rgba(255,255,255,.35)}

/* Main area */
.mainArea{
  position:relative;z-index:5;
  display:grid;grid-template-columns:84px 1fr 84px;gap:7px;align-items:center;
  padding:10px 8px 0;
}
.sidePanel{
  height:168px;border-radius:18px;background:linear-gradient(180deg,#882be0,#3c0b78);
  border:3px solid #ffcf42;box-shadow:0 6px 0 #25034e,0 11px 18px rgba(0,0,0,.34);
  padding:7px 5px;text-align:center
}
.sidePanel h3{font-family:'Baloo 2';font-size:17px;line-height:.9;margin:0;color:#ffe766;text-shadow:0 2px 0 #4d0753}
.sidePanel .icon{font-size:43px;margin:4px 0}.sidePanel p{margin:3px 0;font-size:13px}
.greenBtn{border:0;border-radius:12px;background:linear-gradient(180deg,#9dff55,#20b72a);box-shadow:0 4px 0 #086b14;color:white;font-weight:900;padding:7px 10px;text-shadow:0 2px 0 #074d10}

/* Board */
.board{
  width:100%;aspect-ratio:1/1;display:grid;grid-template-columns:repeat(8,1fr);
  gap:4px;padding:7px;background:#082b5d;border:4px solid #ffba25;border-radius:28px;
  box-shadow:0 9px 0 #8c5013,0 18px 32px rgba(0,0,0,.38),inset 0 0 18px rgba(255,255,255,.12)
}
.cell{
  border-radius:10px;background:linear-gradient(180deg,#164d8b,#0b2853);
  display:grid;place-items:center;position:relative;overflow:hidden;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.16)
}
.tile{width:88%;height:88%;display:grid;place-items:center;font-size:clamp(20px,7vw,34px);filter:drop-shadow(0 6px 4px rgba(0,0,0,.36));transition:.13s}
.tile.selected{transform:scale(1.14);filter:drop-shadow(0 0 12px white)}
.special{position:absolute;right:0;bottom:-2px;font-size:15px;text-shadow:0 2px 2px #000}

/* Path and bottom */
.path{position:relative;z-index:6;display:grid;grid-template-columns:repeat(10,1fr);gap:4px;margin:8px 8px 0}
.node{
  height:35px;border-radius:50%;display:grid;place-items:center;font-size:15px;font-weight:900;
  background:linear-gradient(180deg,#c8c8c8,#5b5b5b);
  border:3px solid rgba(255,255,255,.65);box-shadow:0 4px 0 rgba(0,0,0,.35)
}
.node.done{background:linear-gradient(180deg,#c0ff57,#22a728)}
.node.current{background:linear-gradient(180deg,#ff5bd5,#aa16dc);transform:scale(1.18);box-shadow:0 0 15px #fff,0 5px 0 #6e0b88}
.node.locked:after{content:"🔒";font-size:11px}

.bottom{
  position:absolute;left:0;right:0;bottom:0;z-index:8;
  padding:8px 10px calc(8px + env(safe-area-inset-bottom));
  background:linear-gradient(180deg,rgba(84,18,137,.96),#370864);
  border-top:4px solid rgba(255,255,255,.22);
}
.boosters{display:grid;grid-template-columns:repeat(4,1fr) 1.28fr;gap:8px}
.boost,.play{
  border:0;border-radius:22px;color:white;font-family:'Baloo 2';font-weight:900;text-shadow:0 2px 0 rgba(0,0,0,.45)
}
.boost{height:58px;background:linear-gradient(180deg,#36eaff,#1557dd);box-shadow:0 6px 0 #0b3387;font-size:12px}
.boost i{display:block;font-size:25px;line-height:20px;font-style:normal}
.play{background:linear-gradient(180deg,#b5ff4e,#1ab82c);box-shadow:0 7px 0 #087916;font-size:32px}
.nav{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-top:7px}
.nav div{height:50px;border-radius:14px;background:linear-gradient(180deg,#7923c4,#45107a);display:grid;place-items:center;font-size:11px;font-weight:900}
.nav i{display:block;font-style:normal;font-size:22px}

/* Popups */
.toast{
  position:absolute;left:50%;top:45%;transform:translate(-50%,-50%);z-index:30;
  background:linear-gradient(180deg,#ff55c8,#6c19b3);border:3px solid #ffdf45;border-radius:24px;
  padding:13px 20px;font-family:'Baloo 2';font-size:25px;font-weight:900;opacity:0;transition:.22s;pointer-events:none
}
.toast.show{opacity:1;top:41%}
.modal{position:absolute;inset:0;z-index:40;background:rgba(5,6,28,.72);display:none;align-items:center;justify-content:center;padding:22px;backdrop-filter:blur(4px)}
.card{max-width:380px;width:100%;border-radius:30px;background:linear-gradient(180deg,#ff6ad6,#7622c7 52%,#26064c);border:4px solid #ffdf45;box-shadow:0 22px 70px rgba(0,0,0,.55);text-align:center;padding:24px}
.card h1{font-family:'Baloo 2';font-size:42px;line-height:.9;margin:0;color:#fff36b;text-shadow:0 4px 0 #7b145a}
.stars{font-size:42px;margin:10px}.reward{font-size:22px;color:#fff36b;font-weight:900}.card p{line-height:1.35}
.card button{width:100%;border:0;border-radius:20px;padding:12px;background:linear-gradient(180deg,#b4ff4e,#19b82c);box-shadow:0 7px 0 #087916;color:white;font-family:'Baloo 2';font-size:24px;font-weight:900}
.coinBurst{position:absolute;z-index:20;font-size:24px;animation:coin .7s forwards;pointer-events:none}
@keyframes coin{to{transform:translateY(-60px) scale(1.25);opacity:0}}

/* Fit below punch-hole and above navigation on smaller phones */
@media(max-height:900px){
  .logoWrap{margin-top:calc(62px + env(safe-area-inset-top));width:72%}
  .crown{font-size:40px}.logo{font-size:52px}.ribbon{font-size:20px}
  .status{height:70px}.mainArea{padding-top:6px}
  .sidePanel{display:none}.mainArea{grid-template-columns:1fr}.board{max-width:388px;margin:auto}
  .path{margin-top:5px}.nav{display:none}.boost{height:50px}
}
@media(max-height:720px){
  .logoWrap{display:none}
  .topCounters,.topButtons{transform:scale(.82)}.topButtons{transform-origin:top right}.topCounters{transform-origin:top left}
  .status{margin-top:calc(64px + env(safe-area-inset-top));height:66px}
  .path{display:none}.boost{height:44px}.play{font-size:25px}
  .bottom{padding-top:6px}
}
</style>
</head>
<body>
<main class="game">
  <div class="bg"><div class="castle">🏰</div><div class="falls1"></div><div class="falls2"></div><div class="hills"></div></div>

  <div class="topCounters">
    <div class="counter"><i>❤️</i><b>5 FULL</b></div>
    <div class="counter"><i>💰</i><b id="coinText">2450</b></div>
    <div class="counter"><i>⭐</i><b id="starText">24</b></div>
  </div>

  <div class="topButtons">
    <button id="musicBtn" class="roundBtn">🎵</button>
    <button id="sfxBtn" class="roundBtn">🔊</button>
  </div>

  <section class="logoWrap">
    <div class="crown">👑</div>
    <h1 class="logo"><span class="gem">GEM</span><span class="kingdom">KINGDOM</span></h1>
    <div class="ribbon">LEGENDS</div>
  </section>

  <section class="status">
    <div class="levelShield"><span>Level</span><b id="level">1</b></div>
    <div class="goalBoxes">
      <div class="goalBox"><span>Moves</span><b id="moves">24</b></div>
      <div class="goalBox"><span>Goal</span><b>💎 <span id="target">37</span></b></div>
      <div class="goalBox"><span>Score</span><b id="score">0</b></div>
    </div>
    <div class="king">👑</div>
  </section>

  <section class="mainArea">
    <aside class="sidePanel">
      <h3>Daily<br>Reward</h3><div class="icon">🎁</div><p id="dailyText">READY</p><button id="dailyBtn" class="greenBtn">CLAIM</button>
    </aside>
    <div id="board" class="board"></div>
    <aside class="sidePanel">
      <h3>Extra<br>Moves</h3><div class="icon">+5</div><p>💰 1500</p><button id="buyMoves" class="greenBtn">BUY</button>
    </aside>
  </section>

  <div id="map" class="path"></div>

  <section class="bottom">
    <div class="boosters">
      <button id="hammer" class="boost"><i>🔨</i>HAMMER</button>
      <button id="swapBtn" class="boost"><i>🔁</i>SWAP</button>
      <button id="shuffle" class="boost"><i>🔀</i>SHUFFLE</button>
      <button id="bombBtn" class="boost"><i>💣</i>BOMB</button>
      <button id="restart" class="play">PLAY</button>
    </div>
    <div class="nav"><div><i>🏪</i>SHOP</div><div><i>🗺️</i>MAP</div><div><i>🏰</i>HOME</div><div><i>🏆</i>EVENTS</div><div><i>🛡️</i>KINGDOM</div></div>
  </section>

  <div id="toast" class="toast"></div>
  <div id="modal" class="modal"><div class="card"><h1 id="modalTitle">Victory!</h1><div id="stars" class="stars">⭐⭐⭐</div><div id="rewardLine" class="reward"></div><p id="modalText"></p><button id="next">Next Level</button></div></div>
</main>

<script>
(()=> {
const W=8,H=8,TYPES=['🔴','🟡','💧','🌿','💜','💎'],$=id=>document.getElementById(id);
const boardEl=$('board'),mapEl=$('map'),modal=$('modal'),toastEl=$('toast');
let board=[],selected=null,busy=false,level=1,moves=24,score=0,target=3500,hammer=3,bombs=2,ended=false;
let profile=load();
function load(){try{return Object.assign({coins:2450,stars:24,best:1,levelStars:{},lastDaily:''},JSON.parse(localStorage.getItem('gkl_ref_style_v07')||'{}'))}catch(e){return{coins:2450,stars:24,best:1,levelStars:{},lastDaily:''}}}
function save(){localStorage.setItem('gkl_ref_style_v07',JSON.stringify(profile));localStorage.setItem('gkl_level',level)}
const rand=()=>Math.floor(Math.random()*TYPES.length),gem=(type=rand(),special='')=>({type,special});
function init(){level=Math.max(1,Math.min(20,parseInt(localStorage.getItem('gkl_level')||profile.best||1,10)));moves=Math.max(18,25-Math.floor(level*.25));target=2800+level*650;score=0;hammer=3;bombs=2;ended=false;selected=null;busy=false;makeBoard();renderMap();update();resolve(false,true)}
function makeBoard(){board=Array.from({length:H},(_,y)=>Array.from({length:W},(_,x)=>{let g;do{g=gem()}while((x>=2&&board[y]?.[x-1]?.type===g.type&&board[y]?.[x-2]?.type===g.type)||(y>=2&&board[y-1]?.[x]?.type===g.type&&board[y-2]?.[x]?.type===g.type));return g}))}
function render(){boardEl.innerHTML='';for(let y=0;y<H;y++)for(let x=0;x<W;x++){let cell=document.createElement('div');cell.className='cell';cell.dataset.x=x;cell.dataset.y=y;let g=board[y][x];if(g){let d=document.createElement('div');d.className='tile'+(selected&&selected.x===x&&selected.y===y?' selected':'');d.textContent=TYPES[g.type];if(g.special){let s=document.createElement('span');s.className='special';s.textContent=g.special==='rocket'?'🚀':g.special==='bomb'?'💣':'🌈';d.appendChild(s)}cell.appendChild(d)}boardEl.appendChild(cell)}}
function update(){$('level').textContent=level;$('moves').textContent=moves;$('score').textContent=Math.min(9999,score);$('target').textContent=Math.ceil(target/100);$('coinText').textContent=profile.coins.toLocaleString();$('starText').textContent=profile.stars;$('hammer').innerHTML='<i>🔨</i>HAMMER x'+hammer;$('bombBtn').innerHTML='<i>💣</i>BOMB x'+bombs;render()}
function renderMap(){mapEl.innerHTML='';for(let i=1;i<=20;i++){let n=document.createElement('div'),st=profile.levelStars[i]||0;n.className='node '+(st?'done':i===level?'current':'locked');n.textContent=st?'★':i;mapEl.appendChild(n)}}
function matches(){let groups=[];for(let y=0;y<H;y++){let run=[{x:0,y}];for(let x=1;x<W;x++){if(board[y][x]&&board[y][x-1]&&board[y][x].type===board[y][x-1].type)run.push({x,y});else{if(run.length>=3)groups.push([...run]);run=[{x,y}]}}if(run.length>=3)groups.push([...run])}for(let x=0;x<W;x++){let run=[{x,y:0}];for(let y=1;y<H;y++){if(board[y][x]&&board[y-1][x]&&board[y][x].type===board[y-1][x].type)run.push({x,y});else{if(run.length>=3)groups.push([...run]);run=[{x,y}]}}if(run.length>=3)groups.push([...run])}return groups}
function swap(a,b){[board[a.y][a.x],board[b.y][b.x]]=[board[b.y][b.x],board[a.y][a.x]]}
function adjacent(a,b){return Math.abs(a.x-b.x)+Math.abs(a.y-b.y)===1}
async function clickCell(x,y){if(busy||ended||modal.style.display==='flex')return;if(!selected){sfx('tap');selected={x,y};update();return}let first=selected;selected=null;if(!adjacent(first,{x,y})){selected={x,y};update();return}busy=true;sfx('swap');swap(first,{x,y});update();await sleep(110);if(!matches().length){swap(first,{x,y});sfx('lose');toast('No Match!');busy=false;update();return}moves--;await resolve(true);busy=false;checkEnd();update()}
async function resolve(countScore=true,initial=false){let combo=0;while(true){let groups=matches();if(!groups.length)break;combo++;let clear=new Map(),made=null;for(let group of groups){for(let p of group)clear.set(p.x+','+p.y,p);if(!initial&&group.length>=4){let p=group[Math.floor(group.length/2)],g=board[p.y][p.x];made={p,type:g.type,special:group.length>=5?'rainbow':'rocket'}}}if(made)clear.delete(made.p.x+','+made.p.y);for(let key of clear.keys()){let [x,y]=key.split(',').map(Number);burst(x,y);board[y][x]=null}if(made)board[made.p.y][made.p.x]=gem(made.type,made.special);if(countScore){sfx(combo>1?'combo':'match');score+=clear.size*100*combo;if(combo>1)toast('Combo x'+combo+'!')}update();await sleep(150);dropFill();update();await sleep(150)}}
function dropFill(){for(let x=0;x<W;x++){let stack=[];for(let y=H-1;y>=0;y--)if(board[y][x])stack.push(board[y][x]);for(let y=H-1;y>=0;y--)board[y][x]=stack[H-1-y]||gem()}}
function activate(x,y,bomb=false){if(ended)return;sfx('booster');let g=board[y][x],pts=[];if(bomb||g?.special==='bomb'){for(let yy=y-1;yy<=y+1;yy++)for(let xx=x-1;xx<=x+1;xx++)if(xx>=0&&yy>=0&&xx<W&&yy<H)pts.push({x:xx,y:yy})}else if(g?.special==='rocket'){for(let i=0;i<W;i++)pts.push({x:i,y})}else if(g?.special==='rainbow'){for(let yy=0;yy<H;yy++)for(let xx=0;xx<W;xx++)if(board[yy][xx]?.type===g.type)pts.push({x:xx,y:yy})}else pts=[{x,y}];pts.forEach(p=>{burst(p.x,p.y);board[p.y][p.x]=null});score+=pts.length*125;dropFill();resolve(true).then(()=>{busy=false;checkEnd();update()})}
function burst(x,y){let r=boardEl.getBoundingClientRect(),c=boardEl.children[y*W+x]?.getBoundingClientRect();if(!c)return;let e=document.createElement('div');e.className='coinBurst';e.textContent=Math.random()>.5?'✨':'💰';e.style.left=(c.left-r.left+c.width/2+90)+'px';e.style.top=(c.top-r.top+c.height/2+220)+'px';document.querySelector('.game').appendChild(e);setTimeout(()=>e.remove(),700)}
function finish(){ended=true;let st=score>=target*1.6?3:score>=target*1.25?2:1,coins=st*100,old=profile.levelStars[level]||0;if(st>old){profile.stars+=st-old;profile.levelStars[level]=st}profile.coins+=coins;profile.best=Math.max(profile.best,Math.min(20,level+1));save();renderMap();update();$('modalTitle').textContent='Level Complete!';$('stars').textContent='⭐'.repeat(st);$('rewardLine').textContent='+'+coins+' Coins';$('modalText').textContent='Amazing! Your Gem Kingdom is getting richer and stronger.';$('next').textContent=level>=20?'Play Again':'Next Level';sfx('win');modal.style.display='flex'}
function checkEnd(){if(ended)return;if(score>=target)finish();else if(moves<=0){ended=true;$('modalTitle').textContent='Out of Moves';$('stars').textContent='💔';$('rewardLine').textContent='Try again or buy extra moves later';$('modalText').textContent='Rewarded ads can be added here in the Play Store version.';$('next').textContent='Try Again';sfx('lose');modal.style.display='flex'}}
function toast(t){toastEl.textContent=t;toastEl.classList.add('show');setTimeout(()=>toastEl.classList.remove('show'),750)}
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
boardEl.addEventListener('click',e=>{let c=e.target.closest('.cell');if(!c)return;let x=+c.dataset.x,y=+c.dataset.y;if(busy)return;let g=board[y][x];if(g?.special){busy=true;moves--;activate(x,y);update();return}clickCell(x,y)});
let sx=0,sy=0;
boardEl.addEventListener('touchstart',e=>{let t=e.touches[0],c=e.target.closest('.cell');if(!c)return;sx=t.clientX;sy=t.clientY;selected={x:+c.dataset.x,y:+c.dataset.y}},{passive:true});
boardEl.addEventListener('touchend',e=>{if(!selected)return;let t=e.changedTouches[0],dx=t.clientX-sx,dy=t.clientY-sy;if(Math.max(Math.abs(dx),Math.abs(dy))<20){update();return}let x=selected.x+(Math.abs(dx)>Math.abs(dy)?(dx>0?1:-1):0),y=selected.y+(Math.abs(dy)>Math.abs(dx)?(dy>0?1:-1):0);if(x>=0&&y>=0&&x<W&&y<H)clickCell(x,y)},{passive:true});
$('shuffle').onclick=()=>{if(busy||ended)return;sfx('shuffle');moves--;makeBoard();toast('Shuffled!');resolve(false,true);checkEnd();update()};
$('hammer').onclick=()=>{if(busy||hammer<=0||ended)return;hammer--;toast('Tap a jewel!');let once=e=>{let c=e.target.closest('.cell');if(!c)return;busy=true;moves--;activate(+c.dataset.x,+c.dataset.y);boardEl.removeEventListener('click',once,true)};boardEl.addEventListener('click',once,true);update()};
$('bombBtn').onclick=()=>{if(busy||bombs<=0||ended)return;bombs--;toast('Tap for blast!');let once=e=>{let c=e.target.closest('.cell');if(!c)return;busy=true;moves--;activate(+c.dataset.x,+c.dataset.y,true);boardEl.removeEventListener('click',once,true)};boardEl.addEventListener('click',once,true);update()};
$('swapBtn').onclick=()=>toast('Swap coming soon!');
$('buyMoves').onclick=()=>{if(profile.coins>=1500){profile.coins-=1500;moves+=5;save();toast('+5 Moves!');update()}else toast('Need coins!')};
$('dailyBtn').onclick=()=>{let today=new Date().toISOString().slice(0,10);if(profile.lastDaily===today){toast('Claimed!');return}profile.coins+=250;profile.lastDaily=today;save();$('dailyText').textContent='CLAIMED';toast('+250 Coins!');sfx('win');update()};
$('dailyText').textContent=profile.lastDaily===new Date().toISOString().slice(0,10)?'CLAIMED':'READY';
$('restart').onclick=()=>{modal.style.display='none';init()};
$('next').onclick=()=>{modal.style.display='none';if(ended&&score>=target){level=level>=20?1:level+1;localStorage.setItem('gkl_level',level)}init()};

/* Real audio from assets/audio */
let sfxOn=localStorage.getItem('gkl_sfx')!=='off',musicOn=localStorage.getItem('gkl_music')!=='off',audioUnlocked=false;
const P='assets/audio/',sounds={tap:new Audio(P+'tap.mp3'),swap:new Audio(P+'swap.mp3'),match:new Audio(P+'match.mp3'),combo:new Audio(P+'combo.mp3'),booster:new Audio(P+'booster.mp3'),shuffle:new Audio(P+'shuffle.mp3'),win:new Audio(P+'win.mp3'),lose:new Audio(P+'lose.mp3')};
const bgm=new Audio(P+'bgm.mp3');bgm.loop=true;bgm.volume=.28;Object.values(sounds).forEach(a=>{a.preload='auto';a.volume=.75});
function unlockAudio(){if(audioUnlocked)return;audioUnlocked=true;Object.values(sounds).forEach(a=>{try{a.load()}catch(e){}});try{bgm.load()}catch(e){};if(musicOn)bgm.play().catch(()=>{})}
function playMusic(){if(musicOn){unlockAudio();bgm.play().catch(()=>{})}}function stopMusic(){bgm.pause()}
function sfx(n){if(!sfxOn||!sounds[n])return;unlockAudio();try{let a=sounds[n].cloneNode(true);a.volume=.75;a.play().catch(()=>{})}catch(e){}}
function refreshAudio(){$('musicBtn').textContent=musicOn?'🎵':'🚫';$('sfxBtn').textContent=sfxOn?'🔊':'🔇'}
$('musicBtn').onclick=()=>{unlockAudio();musicOn=!musicOn;localStorage.setItem('gkl_music',musicOn?'on':'off');refreshAudio();musicOn?playMusic():stopMusic()};
$('sfxBtn').onclick=()=>{unlockAudio();sfxOn=!sfxOn;localStorage.setItem('gkl_sfx',sfxOn?'on':'off');refreshAudio();if(sfxOn)sfx('tap')};
['pointerdown','touchstart','keydown','click'].forEach(ev=>window.addEventListener(ev,()=>{unlockAudio();playMusic()},{once:true,passive:true}));
refreshAudio();init();update();
})();
</script>
</body>
