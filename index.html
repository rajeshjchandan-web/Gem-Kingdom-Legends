<script>
(() => { const W=8,H=8,TYPES=['💎','🔥','🌿','⚡','💧','🌙']; const $=id=>document.getElementById(id); const boardEl=$('board'), levelEl=$('level'), movesEl=$('moves'), scoreEl=$('score'), targetEl=$('target'), progressEl=$('progress'), toastEl=$('toast'), modal=$('modal'), modalTitle=$('modalTitle'), modalText=$('modalText'), starsEl=$('stars'), mapEl=$('map'), coinText=$('coinText'), starText=$('starText'), bestText=$('bestText'), rewardLine=$('rewardLine'); let board=[], selected=null, busy=false, level=1, moves=25, score=0, target=3500, hammer=3, levelEnded=false; const saveKey='gkl_profile_v04'; const defaultProfile={coins:0,totalStars:0,bestLevel:1,levelStars:{},lastDaily:'',dailyStreak:0}; let profile=loadProfile(); function loadProfile(){try{return {...defaultProfile,...JSON.parse(localStorage.getItem(saveKey)||'{}')}}catch(e){return {...defaultProfile}}} function saveProfile(){localStorage.setItem(saveKey,JSON.stringify(profile));localStorage.setItem('gkl_level',String(level));} function todayKey(){return new Date().toISOString().slice(0,10)} function checkDaily(){const t=todayKey(); if(profile.lastDaily!==t){profile.dailyStreak=(profile.dailyStreak%7)+1; const rewards=[100,150,200,250,300,400,600]; const coins=rewards[profile.dailyStreak-1]; profile.coins+=coins; profile.lastDaily=t; saveProfile(); setTimeout(()=>{modalTitle.textContent='Daily Reward!'; starsEl.textContent='🎁'; rewardLine.textContent='+'+coins+' Coins • Day '+profile.dailyStreak; modalText.textContent='Come back daily to grow your treasure streak and rebuild the kingdom faster.'; $('next').textContent='Claim'; modal.style.display='flex'; sfx('win'); update();},650)}} const rand=()=>Math.floor(Math.random()*TYPES.length); const gem=(type=rand(),special='')=>({type,special,id:Math.random().toString(36).slice(2)}); function init(){level=Math.min(Math.max(1,parseInt(localStorage.getItem('gkl_level')||profile.bestLevel||'1',10)),20); moves=Math.max(17,27-Math.floor(level*.55)); score=0; target=2600+l if(board[y][x]&&board[y-1][x]&&board[y][x].type===board[y-1][x].type)run.push({x,y}); else{if(run.length>=3)groups.push([...run]); run=[{x,y}]}} if(run.length>=3)groups.push([...run])} return groups;} function swap(a,b){[board[a.y][a.x],board[b.y][b.x]]=[board[b.y][b.x],board[a.y][a.x]];} function adjacent(a,b){return Math.abs(a.x-b.x)+Math.abs(a.y-b.y)===1} async function clickCell(x,y){if(busy||modal.style.display==='flex'||levelEnded)return; if(!selected){sfx('tap'); selected={x,y}; update(); return} const first=selected; selected=null; if(first.x===x&&first.y===y){update(); return} if(!adjacent(first,{x,y})){selected={x,y}; update(); return} busy=true; sfx('swap'); swap(first,{x,y}); update(); await sleep(120); let m=matches(); if(!m.length){swap(first,{x,y}); sfx('lose'); buzz(30); toast('No match!'); busy=false; update(); return} moves--; await resolve(true); busy=false; checkEnd(); update();} async function resolve(countScore=true,initial=false){let combo=0; while(true){let groups=matches(); if(!groups.length)break; combo++; const clear=new Map(); let madeSpecial=null; for(const group of groups){for(const p of group)clear.set(p.x+','+p.y,p); if(!initial&&group.length>=4){const p=group[Math.floor(group.length/2)], g=board[p.y][p.x]; madeSpecial={p,type:g.type,special:group.length>=5?'rainbow':'rocket'}}} if(madeSpecial){clear.delete(madeSpecial.p.x+','+madeSpecial.p.y)} for(const key of clear.keys()){const [x,y]=key.split(',').map(Number); burst(x,y); board[y][x]=null} if(madeSpecial)board[madeSpecial.p.y][madeSpecial.p.x]=gem(madeSpecial.type,madeSpecial.special); if(countScore){sfx(combo>1?'combo':'match'); buzz(combo>1?35:15); score+=Object.keys(Object.fromEntries(clear)).length*95*combo; if(combo>1)toast('Combo x'+combo+'!')} update(); await sleep(175); dropFill(); update(); await sleep(175)}} function dropFill(){for(let x=0;x<W;x++){let stack=[]; for(let y=H-1;y>=0;y--)if(board[y][x])stack.push(board[y][x]); for(let y=H-1;y>=0;y--)board[y][x]=stack[H-1-y]||gem();}} function activate(x,y){if(levelEnded)return; sfx('booster'); buzz(45); const g=board[y][x]; if(!g)return; let pts=[]; if(g.special==='rocket'){for(let i=0;i<W;i++)pts.push({x:i,y});} else if(g.special==='bomb'){for(let yy=y-1;yy<=y+1;yy++)for(let xx=x-1;xx<=x+1;xx++)if(xx>=0&&yy>=0&&xx<W&&yy<H)pts.push({x:xx,y:yy});} else if(g.special==='rainbow'){for(let yy=0;yy<H;yy++)for(let xx=0;xx<W;xx++)if(board[yy][xx]?.type===g.type)pts.push({x:xx,y:yy});} else pts=[{x,y}]; pts.forEach(p=>{burst(p.x,p.y); board[p.y][p.x]=null}); score+=pts.length*125; dropFill(); resolve(true).then(()=>{busy=false; checkEnd(); update()});} function burst(x,y){const r=boardEl.getBoundingClientRect(), c=boardEl.children[y*W+x]?.getBoundingClientRect(); if(!c)return; const e=document.createElement('div'); e.className='coinBurst'; e.textContent=Math.random()>.45?'✨':'💰'; e.style.left=(c.left-r.left+c.width/2+10)+'px'; e.style.top=(c.top-r.top+c.height/2+104)+'px'; document.querySelector('.game').appendChild(e); setTimeout(()=>e.remove(),760)} function finishLevel(){levelEnded=true; let starCount=score>=target*1.6?3:score>=target*1.25?2:1; let coins=starCount===3?200:starCount===2?100:50; let oldStars=profile.levelStars[level]||0; if(starCount>oldStars){profile.totalStars+=starCount-oldStars; profile.levelStars[level]=starCount} profile.coins+=coins; profile.bestLevel=Math.max(profile.bestLevel,Math.min(20,level+1)); saveProfile(); renderMap(); update(); modalTitle.textContent='Victory!'; starsEl.textContent='⭐'.repeat(starCount); rewardLine.textContent='+'+coins+' Coins'; modalText.textContent='The kingdom grows stronger. Use stars later to rebuild castles, markets, and dragon sanctuaries.'; $('next').textContent=level>=20?'Play Again':'Next Level'; sfx('win'); buzz(80); modal.style.display='flex'} function checkEnd(){if(levelEnded)return; if(score>=target){finishLevel()} else if(moves<=0){levelEnded=true; sfx('lose'); modalTitle.textContent='Out of Moves'; starsEl.textContent='💔'; rewardLine.textContent='Need more magic?'; modalText.textContent='In the monetized version, this screen can offer rewarded ads for extra moves.'; $('next').textContent='Try Again'; modal.style.display='flex'}} function toast(t){toastEl.textContent=t; toastEl.classList.add('show'); setTimeout(()=>toastEl.classList.remove('show'),760)} const sleep=ms=>new Promise(r=>setTimeout(r,ms)); boardEl.addEventListener('click',e=>{const c=e.target.closest('.cell'); if(!c)return; const x=+c.dataset.x,y=+c.dataset.y; if(busy||levelEnded)return; const g=board[y][x]; if(g?.special){busy=true; activate(x,y); moves--; update(); return} clickCell(x,y)}); let sx=0,sy=0; boardEl.addEventListener('touchstart',e=>{const t=e.touches[0],c=e.target.closest('.cell'); if(!c)return; sx=t.clientX; sy=t.clientY; selected={x:+c.dataset.x,y:+c.dataset.y};},{passive:true}); boardEl.addEventListener('touchend',e=>{if(!selected)return; const t=e.changedTouches[0],dx=t.clientX-sx,dy=t.clientY-sy; if(Math.max(Math.abs(dx),Math.abs(dy))<20){update(); return} let x=selected.x+(Math.abs(dx)>Math.abs(dy)?(dx>0?1:-1):0),y=selected.y+(Math.abs(dy)>Math.abs(dx)?(dy>0?1:-1):0); if(x>=0&&y>=0&&x<W&&y<H)clickCell(x,y);},{passive:true}); $('shuffle').onclick=()=>{if(busy||levelEnded)return; sfx('shuffle'); moves--; makeBoard(); toast('Board shuffled!'); resolve(false,true); checkEnd(); update()}; $('hammer').onclick=()=>{if(busy||hammer<=0||levelEnded)return; sfx('tap'); hammer--; toast('Tap any gem to smash!'); const once=e=>{const c=e.target.closest('.cell'); if(!c)return; busy=true; activate(+c.dataset.x,+c.dataset.y); moves--; boardEl.removeEventListener('click',once,true)}; boardEl.addEventListener('click',once,true); update()}; $('restart').onclick=()=>{modal.style.display='none'; init()}; $('next').onclick=()=>{modal.style.display='none'; if(levelEnded&&score>=target){level=level>=20?1:level+1; localStorage.setItem('gkl_level',level)} init()}; let sfxOn=localStorage.getItem('gkl_sfx')!=='off', musicOn=localStorage.getItem('gkl_music')!=='off', audioUnlocked=false; const AUDIO_PATH='assets/audio/'; const sounds={tap:new Audio(AUDIO_PATH+'tap.mp3'),swap:new Audio(AUDIO_PATH+'swap.mp3'),match:new Audio(AUDIO_PATH+'match.mp3'),combo:new Audio(AUDIO_PATH+'combo.mp3'),booster:new Audio(AUDIO_PATH+'booster.mp3'),shuffle:new Audio(AUDIO_PATH+'shuffle.mp3'),win:new Audio(AUDIO_PATH+'win.mp3'),lose:new Audio(AUDIO_PATH+'lose.mp3')}; const bgm=new Audio(AUDIO_PATH+'bgm.mp3'); bgm.loop=true; bgm.volume=.30; Object.values(sounds).forEach(a=>{a.preload='auto'; a.volume=.75}); function unlockAudio(){if(audioUnlocked)return; audioUnlocked=true; Object.values(sounds).forEach(a=>{try{a.load()}catch(e){}}); try{bgm.load()}catch(e){}; if(musicOn)bgm.play().catch(()=>{})} function playMusic(){if(!musicOn)return; unlockAudio(); bgm.play().catch(()=>{})} function stopMusic(){bgm.pause()} function sfx(name){if(!sfxOn||!sounds[name])return; unlockAudio(); try{const a=sounds[name].cloneNode(true); a.volume=.75; a.play().catch(()=>{})}catch(e){}} function buzz(ms=18){if(navigator.vibrate)navigator.vibrate(ms)} const musicBtn=$('musicBtn'),sfxBtn=$('sfxBtn'); function refreshAudioButtons(){musicBtn.textContent=musicOn?'🎵':'🎵🚫'; sfxBtn.textContent=sfxOn?'🔊':'🔇'} musicBtn.onclick=()=>{unlockAudio(); musicOn=!musicOn; localStorage.setItem('gkl_music',musicOn?'on':'off'); refreshAudioButtons(); musicOn?playMusic():stopMusic()}; sfxBtn.onclick=()=>{unlockAudio(); sfxOn=!sfxOn; localStorage.setItem('gkl_sfx',sfxOn?'on':'off'); refreshAudioButtons(); if(sfxOn)sfx('tap')}; ['pointerdown','touchstart','keydown','click'].forEach(ev=>window.addEventListener(ev,()=>{unlockAudio(); playMusic()},{once:true,passive:true})); refreshAudioButtons(); level=parseInt(localStorage.getItem('gkl_level')||profile.bestLevel||'1',10); init(); update(); checkDaily(); })();
