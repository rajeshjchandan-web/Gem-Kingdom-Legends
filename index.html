<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Gem Kingdom Legends</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}html,body{margin:0;height:100%;font-family:Inter,system-ui,Segoe UI,Arial,sans-serif;background:#201038;color:white;overflow:hidden}body{display:flex;align-items:center;justify-content:center}.game{width:min(100vw,480px);height:100dvh;max-height:920px;position:relative;overflow:hidden;background:radial-gradient(circle at 50% 0%,#8e5eff 0,#4c2b91 30%,#25113e 68%,#13091f 100%)}.bg{position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.08),transparent 35%),radial-gradient(circle at 20% 80%,rgba(255,202,68,.22),transparent 30%),radial-gradient(circle at 80% 75%,rgba(89,224,255,.18),transparent 32%);pointer-events:none}.top{position:relative;z-index:2;padding:calc(12px + env(safe-area-inset-top)) 14px 8px}.title{text-align:center;font-weight:900;letter-spacing:.5px;font-size:23px;text-shadow:0 3px 0 rgba(0,0,0,.25)}.subtitle{text-align:center;font-size:12px;opacity:.86;margin-top:2px}.hud{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}.pill{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.24);border-radius:16px;padding:8px;text-align:center;box-shadow:inset 0 1px 0 rgba(255,255,255,.16),0 8px 22px rgba(0,0,0,.14)}.pill b{display:block;font-size:16px}.pill span{font-size:10px;text-transform:uppercase;opacity:.75;letter-spacing:.8px}.target{margin-top:8px;padding:9px 12px;border-radius:18px;background:linear-gradient(135deg,rgba(255,224,104,.22),rgba(255,255,255,.08));display:flex;align-items:center;justify-content:space-between;border:1px solid rgba(255,255,255,.2)}.bar{height:10px;border-radius:99px;background:rgba(0,0,0,.25);overflow:hidden;flex:1;margin-left:10px}.bar>i{display:block;height:100%;width:0%;background:linear-gradient(90deg,#ffd84d,#ff7bd5,#68f2ff);border-radius:99px;transition:.25s}.boardWrap{position:relative;z-index:2;padding:10px 12px 0}.board{width:100%;aspect-ratio:1/1;display:grid;grid-template-columns:repeat(8,1fr);gap:5px;padding:8px;border-radius:26px;background:linear-gradient(180deg,rgba(255,255,255,.2),rgba(0,0,0,.2));box-shadow:0 22px 55px rgba(0,0,0,.34),inset 0 1px 0 rgba(255,255,255,.3);border:1px solid rgba(255,255,255,.22)}.cell{position:relative;border-radius:16px;background:rgba(0,0,0,.17);display:flex;align-items:center;justify-content:center;overflow:hidden}.gem{width:82%;height:82%;border-radius:28% 28% 36% 36%;display:flex;align-items:center;justify-content:center;font-size:clamp(20px,8vw,37px);filter:drop-shadow(0 8px 6px rgba(0,0,0,.25));transition:transform .14s ease,opacity .16s ease}.gem.selected{transform:scale(1.12);outline:3px solid rgba(255,255,255,.85);outline-offset:2px}.gem.pop{animation:pop .24s forwards}.gem.drop{animation:drop .23s ease-out}.gem.hint{animation:pulse .65s infinite alternate}.special{position:absolute;right:2px;bottom:2px;font-size:15px;text-shadow:0 2px 2px #000}@keyframes pop{to{transform:scale(.15) rotate(28deg);opacity:0}}@keyframes drop{from{transform:translateY(-30px) scale(.8);opacity:.4}to{transform:translateY(0) scale(1);opacity:1}}@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.12)}}.bottom{position:relative;z-index:2;padding:10px 14px calc(14px + env(safe-area-inset-bottom));display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.btn{border:0;border-radius:18px;padding:11px 8px;color:white;font-weight:900;background:linear-gradient(180deg,#ffca45,#ff8b2f);box-shadow:0 8px 0 #a44919,0 14px 24px rgba(0,0,0,.22);cursor:pointer}.btn:active{transform:translateY(5px);box-shadow:0 3px 0 #a44919,0 8px 14px rgba(0,0,0,.2)}.btn.blue{background:linear-gradient(180deg,#67e8ff,#3679ff);box-shadow:0 8px 0 #18419e,0 14px 24px rgba(0,0,0,.22)}.btn.pink{background:linear-gradient(180deg,#ff8bdf,#d84dff);box-shadow:0 8px 0 #7921a0,0 14px 24px rgba(0,0,0,.22)}.toast{position:absolute;left:50%;top:48%;transform:translate(-50%,-50%);z-index:5;padding:14px 20px;border-radius:22px;background:rgba(21,10,35,.88);border:1px solid rgba(255,255,255,.24);font-weight:900;font-size:22px;text-align:center;opacity:0;pointer-events:none;transition:.22s;box-shadow:0 18px 45px rgba(0,0,0,.38)}.toast.show{opacity:1;top:44%}.modal{position:absolute;inset:0;z-index:8;background:rgba(11,4,23,.72);display:none;align-items:center;justify-content:center;padding:22px}.card{width:100%;max-width:380px;border-radius:30px;padding:24px;background:linear-gradient(180deg,#6635c8,#2a1648);border:1px solid rgba(255,255,255,.24);box-shadow:0 22px 70px rgba(0,0,0,.45);text-align:center}.card h1{margin:0 0 8px;font-size:34px}.stars{font-size:38px;margin:8px 0 14px}.card p{opacity:.85;line-height:1.45}.map{position:absolute;left:16px;right:16px;bottom:86px;height:48px;border-radius:22px;background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.16);display:flex;align-items:center;justify-content:space-around;font-size:22px}.node{opacity:.55}.node.done{opacity:1;filter:drop-shadow(0 0 8px #ffd84d)}.coinBurst{position:absolute;z-index:6;font-size:24px;animation:coin .7s forwards;pointer-events:none}@keyframes coin{to{transform:translateY(-60px) scale(1.25);opacity:0}}@media(max-height:690px){.title{font-size:19px}.subtitle{display:none}.hud{margin-top:6px}.pill{padding:5px}.target{padding:6px 10px}.bottom{padding-top:6px}.map{display:none}.boardWrap{padding-top:5px}.board{gap:4px;padding:6px}}
  </style>
</head>
<body>
  <main class="game">
    <div class="bg"></div>
    <section class="top">
      <div class="title">💎 Gem Kingdom Legends</div>
      <div class="subtitle">Match. Conquer. Rebuild the Kingdom.</div>
      <div class="hud">
        <div class="pill"><b id="level">1</b><span>Level</span></div>
        <div class="pill"><b id="moves">25</b><span>Moves</span></div>
        <div class="pill"><b id="score">0</b><span>Score</span></div>
      </div>
      <div class="target"><b>Target <span id="target">3500</span></b><div class="bar"><i id="progress"></i></div></div>
    </section>
    <section class="boardWrap"><div id="board" class="board"></div></section>
    <div class="map" id="map"></div>
    <section class="bottom">
      <button class="btn blue" id="shuffle">Shuffle</button>
      <button class="btn pink" id="hammer">Hammer x3</button>
      <button class="btn" id="restart">Restart</button><button class="btn blue" id="soundBtn" style="position:absolute;right:10px;top:10px;padding:8px 10px;">🔊</button>
    </section>
    <div id="toast" class="toast"></div>
    <div id="modal" class="modal"><div class="card"><h1 id="modalTitle">Victory!</h1><div id="stars" class="stars">⭐⭐⭐</div><p id="modalText"></p><button class="btn" id="next">Next Level</button></div></div>
  </main>
<script>
(() => {
  const W=8,H=8,TYPES=['💎','🔥','🌿','⚡','💧','🌙'];
  const boardEl=document.getElementById('board'), levelEl=document.getElementById('level'), movesEl=document.getElementById('moves'), scoreEl=document.getElementById('score'), targetEl=document.getElementById('target'), progressEl=document.getElementById('progress'), toastEl=document.getElementById('toast'), modal=document.getElementById('modal'), modalTitle=document.getElementById('modalTitle'), modalText=document.getElementById('modalText'), starsEl=document.getElementById('stars'), mapEl=document.getElementById('map');
  let board=[], selected=null, busy=false, level=1, moves=25, score=0, target=3500, hammer=3;
  const rand=()=>Math.floor(Math.random()*TYPES.length);
  const gem=(type=rand(),special='')=>({type,special,id:Math.random().toString(36).slice(2)});
  function init(){moves=Math.max(18,26-level);score=0;target=3000+level*650;selected=null;busy=false;hammer=3;makeBoard();renderMap();update();resolve(false,true);}
  function makeBoard(){board=Array.from({length:H},(_,y)=>Array.from({length:W},(_,x)=>{let g;do{g=gem()}while((x>=2&&board[y]?.[x-1]?.type===g.type&&board[y]?.[x-2]?.type===g.type)||(y>=2&&board[y-1]?.[x]?.type===g.type&&board[y-2]?.[x]?.type===g.type));return g;}));}
  function render(){boardEl.innerHTML='';for(let y=0;y<H;y++)for(let x=0;x<W;x++){const cell=document.createElement('div');cell.className='cell';cell.dataset.x=x;cell.dataset.y=y;const g=board[y][x];if(g){const d=document.createElement('div');d.className='gem'+(selected&&selected.x===x&&selected.y===y?' selected':'');d.textContent=TYPES[g.type];if(g.special){const s=document.createElement('span');s.className='special';s.textContent=g.special==='rocket'?'🚀':g.special==='bomb'?'💣':'🌈';d.appendChild(s)}cell.appendChild(d)}boardEl.appendChild(cell)}}
  function update(){levelEl.textContent=level;movesEl.textContent=moves;scoreEl.textContent=score;targetEl.textContent=target;progressEl.style.width=Math.min(100,score/target*100)+'%';document.getElementById('hammer').textContent='Hammer x'+hammer;render();}
  function renderMap(){mapEl.innerHTML='';for(let i=1;i<=5;i++){const n=document.createElement('span');n.className='node '+(i<=((level-1)%5)+1?'done':'');n.textContent=i===1?'🏰':i===2?'🌲':i===3?'⛲':i===4?'🐉':'👑';mapEl.appendChild(n)}}
  function matches(){const groups=[];for(let y=0;y<H;y++){let run=[{x:0,y}];for(let x=1;x<W;x++){if(board[y][x]&&board[y][x-1]&&board[y][x].type===board[y][x-1].type)run.push({x,y});else{if(run.length>=3)groups.push([...run]);run=[{x,y}]}}if(run.length>=3)groups.push([...run])}for(let x=0;x<W;x++){let run=[{x,y:0}];for(let y=1;y<H;y++){if(board[y][x]&&board[y-1][x]&&board[y][x].type===board[y-1][x].type)run.push({x,y});else{if(run.length>=3)groups.push([...run]);run=[{x,y}]}}if(run.length>=3)groups.push([...run])}return groups;}
  function swap(a,b){[board[a.y][a.x],board[b.y][b.x]]=[board[b.y][b.x],board[a.y][a.x]];}
  function adjacent(a,b){return Math.abs(a.x-b.x)+Math.abs(a.y-b.y)===1}
  async function clickCell(x,y){if(busy||modal.style.display==='flex')return;if(!selected){selected={x,y};update();return}const first=selected;selected=null;if(first.x===x&&first.y===y){update();return}if(!adjacent(first,{x,y})){selected={x,y};update();return}busy=true;swap(first,{x,y});update();await sleep(120);let m=matches();if(!m.length){swap(first,{x,y});toast('No match!');busy=false;update();return}moves--;await resolve(true);busy=false;checkEnd();update();}
  async function resolve(countScore=true,initial=false){let combo=0;while(true){let groups=matches();if(!groups.length)break;combo++;const clear=new Map();let madeSpecial=null;for(const group of groups){for(const p of group)clear.set(p.x+','+p.y,p);if(!initial&&group.length>=4){const p=group[Math.floor(group.length/2)], g=board[p.y][p.x];madeSpecial={p,type:g.type,special:group.length>=5?'rainbow':'rocket'}}}
      if(madeSpecial){clear.delete(madeSpecial.p.x+','+madeSpecial.p.y)}
      for(const key of clear.keys()){const [x,y]=key.split(',').map(Number);burst(x,y);board[y][x]=null}
      if(madeSpecial)board[madeSpecial.p.y][madeSpecial.p.x]=gem(madeSpecial.type,madeSpecial.special);
      if(countScore){score+=Object.keys(Object.fromEntries(clear)).length*90*combo;if(combo>1)toast('Combo x'+combo+'!')}
      update();await sleep(180);dropFill();update();await sleep(180)} }
  function dropFill(){for(let x=0;x<W;x++){let stack=[];for(let y=H-1;y>=0;y--)if(board[y][x])stack.push(board[y][x]);for(let y=H-1;y>=0;y--)board[y][x]=stack[H-1-y]||gem();}}
  function activate(x,y){const g=board[y][x];if(!g)return;let pts=[];if(g.special==='rocket'){for(let i=0;i<W;i++)pts.push({x:i,y});}else if(g.special==='bomb'){for(let yy=y-1;yy<=y+1;yy++)for(let xx=x-1;xx<=x+1;xx++)if(xx>=0&&yy>=0&&xx<W&&yy<H)pts.push({x:xx,y:yy});}else if(g.special==='rainbow'){for(let yy=0;yy<H;yy++)for(let xx=0;xx<W;xx++)if(board[yy][xx]?.type===g.type)pts.push({x:xx,y:yy});}else pts=[{x,y}];pts.forEach(p=>{burst(p.x,p.y);board[p.y][p.x]=null});score+=pts.length*120;dropFill();resolve(true).then(()=>{busy=false;checkEnd();update()});}
  function burst(x,y){const r=boardEl.getBoundingClientRect(), c=boardEl.children[y*W+x]?.getBoundingClientRect();if(!c)return;const e=document.createElement('div');e.className='coinBurst';e.textContent='✨';e.style.left=(c.left-r.left+c.width/2+12)+'px';e.style.top=(c.top-r.top+c.height/2+110)+'px';document.querySelector('.game').appendChild(e);setTimeout(()=>e.remove(),700)}
  function checkEnd(){if(score>=target){let s=score>=target*1.6?'⭐⭐⭐':score>=target*1.25?'⭐⭐':'⭐';modalTitle.textContent='Victory!';starsEl.textContent=s;modalText.textContent='The kingdom grows stronger. You earned coins, stars, and new royal progress.';document.getElementById('next').textContent='Next Level';modal.style.display='flex'}else if(moves<=0){modalTitle.textContent='Out of Moves';starsEl.textContent='💔';modalText.textContent='Watch a rewarded ad in the real version for extra moves, or try again.';document.getElementById('next').textContent='Try Again';modal.style.display='flex'}}
  function toast(t){toastEl.textContent=t;toastEl.classList.add('show');setTimeout(()=>toastEl.classList.remove('show'),760)}
  const sleep=ms=>new Promise(r=>setTimeout(r,ms));
  boardEl.addEventListener('click',e=>{const c=e.target.closest('.cell');if(!c)return;const x=+c.dataset.x,y=+c.dataset.y;if(busy)return;const g=board[y][x];if(g?.special){busy=true;activate(x,y);moves--;update();return}clickCell(x,y)});
  let sx=0,sy=0;boardEl.addEventListener('touchstart',e=>{const t=e.touches[0],c=e.target.closest('.cell');if(!c)return;sx=t.clientX;sy=t.clientY;selected={x:+c.dataset.x,y:+c.dataset.y};},{passive:true});boardEl.addEventListener('touchend',e=>{if(!selected)return;const t=e.changedTouches[0],dx=t.clientX-sx,dy=t.clientY-sy;if(Math.max(Math.abs(dx),Math.abs(dy))<20){update();return}let x=selected.x+(Math.abs(dx)>Math.abs(dy)?(dx>0?1:-1):0),y=selected.y+(Math.abs(dy)>Math.abs(dx)?(dy>0?1:-1):0);if(x>=0&&y>=0&&x<W&&y<H)clickCell(x,y);},{passive:true});
  document.getElementById('shuffle').onclick=()=>{if(busy)return;moves--;makeBoard();toast('Board shuffled!');resolve(false,true);checkEnd();update()};
  document.getElementById('hammer').onclick=()=>{if(busy||hammer<=0)return;hammer--;toast('Tap any gem to smash!');const once=e=>{const c=e.target.closest('.cell');if(!c)return;busy=true;activate(+c.dataset.x,+c.dataset.y);moves--;boardEl.removeEventListener('click',once,true)};boardEl.addEventListener('click',once,true);update()};
  document.getElementById('restart').onclick=()=>{modal.style.display='none';init()};
  document.getElementById('next').onclick=()=>{modal.style.display='none';if(score>=target)level++;init()};
  
let soundOn = localStorage.getItem('gkl_sound') !== 'off';
level = parseInt(localStorage.getItem('gkl_level') || '1',10);
const soundBtn=document.getElementById('soundBtn');
if(soundBtn){
 soundBtn.textContent=soundOn?'🔊':'🔇';
 soundBtn.onclick=()=>{
   soundOn=!soundOn;
   localStorage.setItem('gkl_sound',soundOn?'on':'off');
   soundBtn.textContent=soundOn?'🔊':'🔇';
 };
}
const oldInit=init;
init=function(){
 oldInit();
 localStorage.setItem('gkl_level', level);
}

init();
})();
</script>
</body>
</html>
